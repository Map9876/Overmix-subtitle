name: Build Overmix

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ \
            qtbase5-dev libqt5svg5-dev libqt5x11extras5-dev \
            libboost-all-dev libeigen3-dev libfftw3-dev \
            libpng-dev libpng++-dev libjpeg-dev libraw-dev \
            liblcms2-dev libpugixml-dev zlib1g-dev liblzma-dev \
            libavformat-dev libavcodec-dev libavutil-dev
      
      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=release -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/src/gpu"
          make -j$(nproc) 2>&1 || (cat CMakeFiles/OvermixCore.dir/flags.make; exit 1)
      
      - name: Package
        run: |
          mkdir -p package
          cp build/OvermixCli package/
          cp build/Overmix package/ 2>/dev/null || true
          cp build/OvermixTrainer package/ 2>/dev/null || true
          cd package
          tar -czf ../overmix-linux-x86_64.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: overmix-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
      
      - name: Install dependencies via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install boost:x64-windows eigen3:x64-windows fftw3:x64-windows \
            libpng:x64-windows libjpeg-turbo:x64-windows \
            pugixml:x64-windows zlib:x64-windows xz:x64-windows
        shell: cmd
      
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release
        shell: cmd
      
      - name: Package
        run: |
          mkdir package
          copy build\Release\OvermixCli.exe package\
          cd package
          7z a ..\overmix-windows-x86_64.zip *
        shell: cmd
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: overmix-windows-x86_64.zip

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install cmake qt@5 boost eigen fftw libpng jpeg libraw \
            little-cms2 pugixml xz ffmpeg
      
      - name: Build
        run: |
          export PATH="/usr/local/opt/qt@5/bin:$PATH"
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=release \
            -DCMAKE_PREFIX_PATH="/usr/local/opt/qt@5"
          make -j$(sysctl -n hw.ncpu)
      
      - name: Package
        run: |
          mkdir -p package
          cp build/OvermixCli package/
          cd package
          tar -czf ../overmix-macos-x86_64.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: overmix-macos-x86_64.tar.gz

  build-termux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build in Termux container
        uses: addnab/docker-run-action@v3
        with:
          image: termux/termux-docker:latest
          options: -v ${{ github.workspace }}:/work -w /work
          run: |
            pkg update -y
            pkg install -y cmake clang make boost eigen fftw libpng libjpeg-turbo \
              libraw libpugixml zlib liblzma ffmpeg git
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=release
            make -j$(nproc)
            mkdir -p ../package
            cp OvermixCli ../package/
            cd ../package
            tar -czf ../overmix-termux-aarch64.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-aarch64
          path: overmix-termux-aarch64.tar.gz

  release:
    needs: [build-linux-x86_64, build-termux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-x86_64/overmix-linux-x86_64.tar.gz
            termux-aarch64/overmix-termux-aarch64.tar.gz
            windows-x86_64/overmix-windows-x86_64.zip
            macos-x86_64/overmix-macos-x86_64.tar.gz
          draft: true
